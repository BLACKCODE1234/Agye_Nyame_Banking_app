server.port=8080
spring.application.name=banking-backend

# PostgreSQL database (override via env vars)
spring.datasource.url=jdbc:postgresql://localhost:5432/bankdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=Spickles@004.com
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT (override JWT_SECRET in production!)
app.jwt.secret=${JWT_SECRET:dev-only-change-me-please-this-is-a-long-development-secret-key-1234567890}
app.jwt.expiration-ms=3600000

# OTP
app.otp.ttl-seconds=300
app.otp.length=6
# When true (dev), the requested OTP is returned in the API response. NEVER enable in production.
app.otp.dev-return=true
